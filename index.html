<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thomasmvrinho — Création de Sites Internet</title>
    <meta name="description" content="Freelance spécialisé dans la création de sites vitrines et e-commerce sur-mesure. Sites performants, modernes et optimisés SEO." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Formulaire caché pour que Netlify le détecte au build -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="type">
        <option value="vitrine">Site Vitrine</option>
        <option value="ecommerce">E-commerce</option>
        <option value="refonte">Refonte</option>
        <option value="autre">Autre</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
